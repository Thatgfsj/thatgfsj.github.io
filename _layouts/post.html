---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="wrapper">
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          <i class="far fa-calendar-alt"></i> {{ page.date | date: "%Y 年 %m 月 %d 日" }}
        </time>
        {% if page.tags %}
          <span class="post-tags">
            {% for tag in page.tags %}
              <span class="tag">{{ tag }}</span>
            {% endfor %}
          </span>
        {% endif %}
      </div>
      <h1 class="post-title">{{ page.title }}</h1>
    </div>
  </header>

  <div class="wrapper post-content">
    {{ content }}
  </div>

  <div class="wrapper post-nav">
    {% if page.previous %}
      <a class="prev" href="{{ page.previous.url | relative_url }}">
        <i class="fas fa-arrow-left"></i> {{ page.previous.title }}
      </a>
    {% endif %}
    {% if page.next %}
      <a class="next" href="{{ page.next.url | relative_url }}">
        {{ page.next.title }} <i class="fas fa-arrow-right"></i>
      </a>
    {% endif %}
  </div>
</article>
