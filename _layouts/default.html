<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/about' | relative_url }}">关于</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ site.time | date: '%Y' }} <a href="https://github.com/{{ site.github_username }}">{{ site.author }}</a>.
       Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a> &amp;
       <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.</p>
    </div>
  </footer>
</body>
</html>
