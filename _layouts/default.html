<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">
        <span class="site-logo">{{ site.title }}</span>
        <span class="site-badge">dev</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a>
        <a href="{{ '/projects' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>项目</a>
        <a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' or page.url contains '/posts' %}class="active"{% endif %}>博客</a>
        <a href="{{ '/about' | relative_url }}" {% if page.url == '/about' %}class="active"{% endif %}>关于</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" class="nav-icon-link"><i class="fab fa-github"></i></a>
      </nav>
      <button class="mobile-nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <div class="footer-grid">
        <div class="footer-brand">
          <strong>{{ site.title }}</strong>
          <p>{{ site.tagline }}</p>
        </div>
        <div class="footer-links">
          <h4>导航</h4>
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/projects' | relative_url }}">项目</a>
          <a href="{{ '/blog' | relative_url }}">博客</a>
          <a href="{{ '/about' | relative_url }}">关于</a>
        </div>
        <div class="footer-social">
          <h4>社交</h4>
          <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. 使用 <a href="https://jekyllrb.com" target="_blank">Jekyll</a> + <a href="https://pages.github.com" target="_blank">GitHub Pages</a> 构建.</p>
      </div>
    </div>
  </footer>

  <script>
    document.querySelector('.mobile-nav-toggle')?.addEventListener('click', function() {
      document.querySelector('.site-nav').classList.toggle('open');
      this.classList.toggle('open');
    });
  </script>
</body>
</html>
