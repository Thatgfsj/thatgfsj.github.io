# ============================
# Jekyll 配置 — 个人简历 / 作品集
# ============================
title: "Thatgfsj"
tagline: "全栈开发者 · 开源爱好者"
description: >-
  热爱编程，专注于 Rust、Python、Android 开发。
  喜欢折腾工具链、自动化流程和 AI 工程化。
author: "Thatgfsj"
avatar: "https://github.com/Thatgfsj.png"
repository: "Thatgfsj/thatgfsj.github.io"

# 社交链接
github_username: "Thatgfsj"
# twitter_username: ""
url: "https://thatgfsj.github.io"
baseurl: ""

# 页面永久链接
permalink: /blog/:year/:month/:title/

# 主题配置
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-paginate

# 排除无关文件
exclude:
  - README.md
  - CLAUDE_COPY.md
  - "*.bat"
  - "*.py"
  - "C:"
  - backup_claude.py
  - check_claude.py
  - check_claude2.py
  - check_path.py
  - check_perm.py
  - check_preserved.py
  - check_reg_path.py
  - clean_all_models.py
  - clean_free_only.py
  - clean_models.py
  - copy_claude.bat
  - fix_path.py
  - fix_permission.py
  - nul
  - run_write.bat
  - test_cmd.py
  - verify_clean.py
  - write_claude.py
  - _write_claude.py
  - .codegraph/

# Markdown
markdown: kramdown
highlighter: rouge

# 分页
paginate: 5
paginate_path: "/blog/page:num/"

# 语言
lang: zh-CN

# 默认 front matter
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:month/:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: page
