# ============================
# Jekyll 配置 — 个人简历 / 作品集
# ============================
title: "Thatgfsj (孙 政)"
tagline: "全栈开发者 · 开源贡献者"
description: >-
  全栈开发者，熟练vibe coding。
  折腾工具链、自动化流程和 AI 工程化。
author: "Thatgfsj (孙 政)"
avatar: "https://github.com/Thatgfsj.png"
repository: "Thatgfsj/thatgfsj.github.io"

# 社交链接
github_username: "Thatgfsj"
# twitter_username: ""
url: "https://www.thatgfsj.xyz"
baseurl: ""

# 页面永久链接
permalink: /blog/:year/:month/:title/

# 主题配置
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-paginate

# 排除无关文件
exclude:
  - README.md
  - CLAUDE_COPY.md
  - .codegraph/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata

# Markdown
markdown: kramdown
highlighter: rouge

# 分页
paginate: 5
paginate_path: "/blog/page:num/"

# 语言
lang: zh-CN

# 默认 front matter
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:month/:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: page
